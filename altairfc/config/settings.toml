[mavlink]
port = "/dev/serial/by-id/usb-Auterion_PX4_FMU_v6X.x_0-if00"
baud = 115200

[telemetry]
port = "auto"   # "auto": detect CP210x (LR-900p); explicit: "/dev/ttyUSB0"; "none": disable radio
baud = 57600

[tasks.mavlink]
enabled = true
period_s = 0.02   # 50 Hz

[tasks.telemetry]
enabled = true
period_s = 0.05    # 20 Hz tick — each packet type has its own TX_RATE_HZ set in its class

[tasks.pointing]
enabled = true
period_s = 0.05

[tasks.sphere_pitch]
enabled = false
period_s = 1.0

[tasks.photodiode]
enabled = false
period_s = 0.01   # 100 Hz

[tasks.power]
enabled = true
period_s = 0.1    # 10 Hz
i2c_dev  = "/dev/i2c-1"

[tasks.command_receiver]
enabled  = true
period_s = 0.05   # 20 Hz — drains incoming command frames between telemetry cycles

[tasks.gps]
enabled  = true
period_s = 1.0    # 1 Hz — MAX-M10M default output rate

[tasks.flight_stage]
enabled  = true
period_s = 0.5    # 2 Hz

[tasks.datalogger]
enabled  = true
period_s = 0.05   # 20 Hz tick — each packet logged at its own TX_RATE_HZ

[tasks.radio_config]
enabled  = true
period_s = 0.5    # 2 Hz — command poll rate; actual radio I/O is blocking

[datalogger]
log_root = "logs"   # relative to altairfc/; absolute paths also accepted

[flight_stage]
termination_altitude_m        = 25000.0   # fire cutdown above this baro MSL altitude (m)
burst_altitude_m              = 30000.0   # expected natural burst altitude (m)
burst_altitude_uncertainty_m  = 2000.0    # ± window for burst zone detection (m)
ascent_detect_window_s        = 30.0      # rolling window to confirm ascent (s)
ascent_detect_gain_m          = 50.0      # altitude gain over window to confirm ascent (m)
apogee_fraction               = 0.95      # descent declared when alt ≤ this × measured apogee
landing_fraction              = 0.05      # landing declared when alt ≤ this × measured apogee
recovery_stationary_s         = 10.0      # seconds of altitude stationary (±2 m) → recovery
termination_confirm_drop_m    = 100.0     # altitude drop required to confirm cutdown worked (m)
termination_confirm_window_s  = 30.0      # time window for termination confirmation (s)
pointing_activate_altitude_m  = -200.0   # GPS MSL altitude (m) above which motors activate
pointing_duration_min         = 120.0     # how long to run motor control after activation (minutes)

[pointing]
mm_enabled = true
spinup_rpm = 2150
spinup_s = 5.0
stabilize_yaw_rate = 0.1
stability_threshold = 5.0
brake_current = 2000

[system]
log_level = "INFO"
monitor_interval_s = 5.0
watchdog_sec = 30.0   # systemd WatchdogSec — must match flight.service

[ground_station]
use_hardcoded = true   # true: always use lat/lon/alt below; false: use GS GPS command if received
latitude = 45.49446
longitude = -73.55218
altitude = 55.0

[rw_esc]
port = "/dev/serial/by-path/platform-fd500000.pcie-pci-0000:01:00.0-usb-0:1.4:1.0"
baud = 115200

[mm_esc]
port = "/dev/serial/by-path/platform-fd500000.pcie-pci-0000:01:00.0-usb-0:1.3:1.0"
baud = 115200


[radio_config]
# LR900P modem initial configuration applied on startup if it differs from
# the modem's current settings.  Changing these values here takes effect on
# the next FC boot; a RADIO_CONFIG ground command can change them at runtime.
config_enabled = false  # true: read/write modem config on startup and handle GS commands
                        # false: transparent passthrough only — no config frames sent
data_rate  = 0    # 0=Low, 1=Mid, 2=High
tx_power   = 2    # 0=Low, 1=Mid, 2=High
channel    = 0    # 0-63
watchdog_s = 30.0 # seconds without GS contact on new channel before rolling back to defaults
# Telemetry TX rate scale per data_rate index [Low, Mid, High].
# Effective rate = TX_RATE_HZ * scale. Keeps the TX queue from overflowing at lower data rates.
rate_scale = [0.1, 0.33, 1.0]

[controller.reaction_wheel]
Kp = 12740.0
Kd = 1233.96
Ki = 0.0
max_rpm = 2150.0
min_rpm = -2130.0


[controller.momentum_management]
Kp = 0.0
Kd = 734.0
Ki = 0.0
max_current = 800.0
min_current = -800.0
